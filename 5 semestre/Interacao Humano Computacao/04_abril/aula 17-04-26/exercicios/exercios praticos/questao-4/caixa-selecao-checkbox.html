<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title> Caixa de seleção (checkbox)</title>
</head>
<body>

    <h2>Cadastro</h2>

    <form action="#" method="post">
        
        <label for="nome">Nome:</label><br>
        <input type="text" id="nome" name="nome" required><br><br>

        <input type="checkbox" id="novidades" name="novidades">
        <label for="novidades">Deseja receber novidades por email?</label><br><br>

        <button type="submit">Enviar</button>

    </form>

</body>
</html>

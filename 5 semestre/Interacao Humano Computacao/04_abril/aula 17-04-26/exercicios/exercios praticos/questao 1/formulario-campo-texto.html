<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <title>Formulário com um campo de texto.</title>
    </head>
    <body>
        <h2>Digite seu nome</h2>
        <form action="/enviar" method="post">
            <label for="nome">Nome:</label><br>
            <input type="text" id="nome" name="nome"><br><br>
            
            <button type="submit">Enviar</button>
        </form>
    </body>
</html>

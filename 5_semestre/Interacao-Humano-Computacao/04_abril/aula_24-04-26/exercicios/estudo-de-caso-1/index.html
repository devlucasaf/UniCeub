<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Perfil do Usuário</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="perfil">
            <h1 class="nome">Lucas Freitas</h1>

            <img 
                src="https://i.pravatar.cc/150" 
                alt="Foto de Perfil" 
                class="foto"
            />

            <p class="descricao">
                Desenvolvedor iniciante apaixonado por tecnologia. 
                Atualmente estagiando e buscando aprender mais sobre desenvolvimento web e design de interfaces.
            </p>

            <button class="botao">Entrar em contato</button>
        </div>
    </body>
</html>

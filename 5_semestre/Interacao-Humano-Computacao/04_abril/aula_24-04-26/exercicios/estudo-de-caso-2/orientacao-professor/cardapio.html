<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Cardápio Digital</title>
        <link rel="stylesheet" href="cardapio.css" />
    </head>
    <body>

        <header>
            <h1 class="titulo-restaurante">Sabores da Casa</h1>
            <p class="subtitulo">Culinária caseira com amor</p>
        </header>

        <main class="cardapio">

        <div class="item-cardapio">
            <h2 class="nome-prato">Frango Grelhado</h2>
            <p class="descricao-prato">
                Peito de frango temperado, acompanha arroz e salada.
            </p>
            <span class="preco">R$ 32,00</span>
        </div>

        <div class="item-cardapio">
            <h2 class="nome-prato">Massa ao Molho Rústico</h2>
            <p class="descricao-prato">
                Penne com molho de tomate caseiro e manjericão fresco.
            </p>
            <span class="preco">R$ 28,00</span>
        </div>

        <div class="item-cardapio">
            <h2 class="nome-prato">Salada Tropical</h2>
            <p class="descricao-prato">
            Mix de folhas, frutas da estação e molho cítrico.
            </p>
            <span class="preco">R$ 22,00</span>
        </div>

        </main>

    </body>
</html>
